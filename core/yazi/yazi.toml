[mgr]
linemode = "size"
title_format = "{cwd}  "

# These values are too high and causing slowness
# [preview]
# max_width = 1000
# max_height = 2000

[opener]

tabiew = [{ run = 'tw "$@"', block = true, desc = "Tabiew" }]
vlc = [{ run = 'vlc "$@"', block = true, desc = "VLC" }]

[open]

prepend_rules = [
  { name = "*.csv", use = "tabiew", mime = "text/csv" },
  { name = "*.mp4", use = "vlc", mime = "video/mp4" },
]

[[plugin.prepend_previewers]]
url = "*.stl"
run = "mesh-preview"

[[plugin.prepend_previewers]]
url = "*.3mf"
run = "mesh-preview"
